name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ── Path filters ────────────────────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'src/**'
              - '*.slnx'
              - '*.sln'
            frontend:
              - 'apps/**'
            docker:
              - 'Dockerfile'
              - 'src/Piro.Worker/Dockerfile'
              - 'apps/web/Dockerfile'
              - 'apps/admin/Dockerfile'
              - 'nginx/Dockerfile'

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    name: Backend
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build API
        run: dotnet build src/Piro.Api/Piro.Api.csproj --no-restore -c Release

      - name: Build Worker
        run: dotnet build src/Piro.Worker/Piro.Worker.csproj --no-restore -c Release

  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install (web)
        working-directory: apps/web
        run: pnpm install

      - name: Type check (web)
        working-directory: apps/web
        run: pnpm tsc --noEmit

      - name: Build (web)
        working-directory: apps/web
        run: pnpm build

      - name: Install (admin)
        working-directory: apps/admin
        run: pnpm install

      - name: Type check (admin)
        working-directory: apps/admin
        run: pnpm tsc --noEmit

      - name: Build (admin)
        working-directory: apps/admin
        run: pnpm build

  # ── Docker build ─────────────────────────────────────────────────────────────
  docker:
    name: Docker build
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          platforms: linux/amd64

      - name: Build Worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Piro.Worker/Dockerfile
          push: false
          platforms: linux/amd64

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          platforms: linux/amd64

      - name: Build admin image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/admin/Dockerfile
          push: false
          platforms: linux/amd64

      - name: Build proxy image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: nginx/Dockerfile
          push: false
          platforms: linux/amd64
