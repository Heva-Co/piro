name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ── Path filters ────────────────────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'src/**'
              - '*.slnx'
              - '*.sln'
            frontend:
              - 'frontend/**'
            docker:
              - 'Dockerfile'
              - 'src/Piro.Worker/Dockerfile'

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    name: Backend
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build API
        run: dotnet build src/Piro.Api/Piro.Api.csproj --no-restore -c Release

      - name: Build Worker
        run: dotnet build src/Piro.Worker/Piro.Worker.csproj --no-restore -c Release

  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build

  # ── Docker build ─────────────────────────────────────────────────────────────
  docker:
    name: Docker build
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          platforms: linux/amd64

      - name: Build Worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Piro.Worker/Dockerfile
          push: false
          platforms: linux/amd64
