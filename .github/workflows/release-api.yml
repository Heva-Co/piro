name: Release API

on:
  push:
    tags:
      - "api/v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/heva-co/piro-api

jobs:
  build-binaries:
    name: Build ${{ matrix.rid }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rid:
          - linux-x64
          - linux-arm64
          - win-x64
          - osx-x64
          - osx-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          RAW="${GITHUB_REF_NAME#api/}"
          echo "version=${RAW#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Publish
        run: |
          dotnet publish src/Piro.Api/Piro.Api.csproj \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:Version=${{ steps.version.outputs.version }} \
            --output dist/${{ matrix.rid }}

      - name: Zip artifact
        run: |
          cd dist/${{ matrix.rid }}
          zip -r ../../piro-api-${{ steps.version.outputs.version }}-${{ matrix.rid }}.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: piro-api-${{ matrix.rid }}
          path: piro-api-${{ steps.version.outputs.version }}-${{ matrix.rid }}.zip

  build-docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          RAW="${GITHUB_REF_NAME#api/}"
          echo "version=${RAW#v}" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF_NAME#api/}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          dockerfile: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.version }}

  release:
    name: Create GitHub Release
    needs: [build-binaries, build-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: piro-api-*
          merge-multiple: true

      - name: Extract version
        id: version
        run: |
          RAW="${GITHUB_REF_NAME#api/}"
          echo "version=${RAW#v}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "Piro API v${{ steps.version.outputs.version }}"
          tag_name: ${{ github.ref_name }}
          body: |
            ## Piro API v${{ steps.version.outputs.version }}

            ### Docker (recommended)
            ```bash
            docker pull ghcr.io/heva-co/piro-api:v${{ steps.version.outputs.version }}
            ```

            ### Self-contained binaries
            Self-contained binaries for all platforms. No runtime required.

            See the [Environment Variables](https://github.com/Heva-Co/piro/wiki/Environment-Variables) docs for configuration.
          generate_release_notes: true
          files: artifacts/*.zip
          fail_on_unmatched_files: true
