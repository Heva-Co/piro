name: Release Frontend

on:
  push:
    tags:
      - "frontend/v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/heva-co/piro-frontend

jobs:
  build-docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          RAW="${GITHUB_REF_NAME#frontend/}"
          echo "version=${RAW#v}" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF_NAME#frontend/}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.version }}

  release:
    name: Create GitHub Release
    needs: [build-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Extract version
        id: version
        run: |
          RAW="${GITHUB_REF_NAME#frontend/}"
          echo "version=${RAW#v}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "Piro Frontend v${{ steps.version.outputs.version }}"
          tag_name: ${{ github.ref_name }}
          body: |
            ## Piro Frontend v${{ steps.version.outputs.version }}

            ### Docker (recommended)
            ```bash
            docker pull ghcr.io/heva-co/piro-frontend:v${{ steps.version.outputs.version }}
            ```

            See the [Environment Variables](https://github.com/Heva-Co/piro/wiki/Environment-Variables) docs for configuration.
          generate_release_notes: true
