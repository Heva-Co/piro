name: RFC index

# Fails the build if docs/rfcs/README.md is out of sync with the RFC
# front-matter. The index table and dependency graph are generated by
# scripts/rfc-index.mjs — run `node scripts/rfc-index.mjs` and commit the result.

on:
  pull_request:
    branches: [main]
    paths:
      - "docs/rfcs/**"
      - "scripts/rfc-index.mjs"
      - ".github/workflows/rfc-index.yml"
  push:
    branches: [main]
    paths:
      - "docs/rfcs/**"
      - "scripts/rfc-index.mjs"

jobs:
  check:
    name: Check index is up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify RFC index
        run: node scripts/rfc-index.mjs --check
