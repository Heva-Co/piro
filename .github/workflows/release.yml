name: Release

on:
  release:
    types: [published]

jobs:
  resolve-version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      latest_tag: ${{ steps.version.outputs.latest_tag }}
    steps:
      - name: Extract version
        id: version
        env:
          IS_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          if [ "$IS_PRERELEASE" = "true" ]; then
            echo "latest_tag=" >> "$GITHUB_OUTPUT"
          else
            echo "latest_tag=latest" >> "$GITHUB_OUTPUT"
          fi

  build-docker-api:
    name: Docker — API
    needs: resolve-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          dockerfile: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/heva-co/piro-api:v${{ needs.resolve-version.outputs.version }}
            ${{ needs.resolve-version.outputs.latest_tag && format('ghcr.io/heva-co/piro-api:{0}', needs.resolve-version.outputs.latest_tag) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ needs.resolve-version.outputs.version }}

  build-docker-worker:
    name: Docker — Worker
    needs: resolve-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          dockerfile: src/Piro.Worker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/heva-co/piro-worker:v${{ needs.resolve-version.outputs.version }}
            ${{ needs.resolve-version.outputs.latest_tag && format('ghcr.io/heva-co/piro-worker:{0}', needs.resolve-version.outputs.latest_tag) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ needs.resolve-version.outputs.version }}

  build-docker-web:
    name: Docker — Web
    needs: resolve-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v7
        with:
          context: ./apps/web
          file: ./apps/web/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/heva-co/piro-web:v${{ needs.resolve-version.outputs.version }}
            ${{ needs.resolve-version.outputs.latest_tag && format('ghcr.io/heva-co/piro-web:{0}', needs.resolve-version.outputs.latest_tag) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-docker-proxy:
    name: Docker — Proxy
    needs: resolve-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./nginx/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/heva-co/piro-proxy:v${{ needs.resolve-version.outputs.version }}
            ${{ needs.resolve-version.outputs.latest_tag && format('ghcr.io/heva-co/piro-proxy:{0}', needs.resolve-version.outputs.latest_tag) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  attach-release-assets:
    name: Attach docker-compose.yml to release
    needs: [resolve-version, build-docker-api, build-docker-worker, build-docker-web, build-docker-proxy]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Pin image versions in docker-compose.yml
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
        run: |
          sed "s|\${PIRO_VERSION:-latest}|v${VERSION}|g" docker-compose.yml > docker-compose.release.yml

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" docker-compose.release.yml --clobber
