name: Sync labels from linked issues to PR

on:
  pull_request:
    types: [opened, edited]

jobs:
  sync-labels:
    name: Copy issue labels to PR
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: read

    steps:
      - name: Copy labels from linked issues
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body ?? "";

            // Extract issue numbers from "Closes #N", "Fixes #N", "Resolves #N"
            const pattern = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi;
            const issueNumbers = [...body.matchAll(pattern)].map(m => parseInt(m[1]));

            if (issueNumbers.length === 0) {
              console.log("No linked issues found in PR body.");
              return;
            }

            const labelSet = new Set();
            for (const number of issueNumbers) {
              try {
                const { data: issue } = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: number,
                });
                for (const label of issue.labels) {
                  labelSet.add(label.name);
                }
                console.log(`Issue #${number}: [${issue.labels.map(l => l.name).join(", ")}]`);
              } catch (e) {
                console.log(`Could not fetch issue #${number}: ${e.message}`);
              }
            }

            if (labelSet.size === 0) {
              console.log("No labels to copy.");
              return;
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: [...labelSet],
            });

            console.log(`Added labels to PR #${pr.number}: [${[...labelSet].join(", ")}]`);
