changelog:
  exclude:
    labels:
      # Meta / triage labels — not meaningful in a changelog
      - ignore-for-release
      - duplicate
      - invalid
      - wontfix
      - question
      - help wanted
      - good first issue
      - partial
      # Area labels — used for filtering issues, not for classifying changes
      - auth
      - notifications
      - config-as-code
  categories:
    - title: "New Features"
      labels:
        - enhancement
    - title: "Bug Fixes"
      labels:
        - bug
    - title: "Documentation"
      labels:
        - documentation
    - title: "Infrastructure & Developer Experience"
      labels:
        - infrastructure
        - developer-experience
    - title: "Other Changes"
      labels:
        - "*"
